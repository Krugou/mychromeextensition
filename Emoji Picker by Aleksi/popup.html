<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 300px;
      font-family: sans-serif;
      padding: 10px;
      background: #fafafa;
    }

    h3 {
      margin-top: 0;
      color: #333;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 5px;
      box-sizing: border-box;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .emoji {
      font-size: 24px;
      text-align: center;
      cursor: pointer;
      padding: 5px;
      border-radius: 4px;
      background: #eee;
    }

    .emoji:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <h3>Emoji Picker</h3>
  <input type="text" id="search" placeholder="Search emojis...">
  <div class="emoji-grid" id="grid">
    <!-- Emojis will be injected here -->
  </div>
  <script src="popup.js"></script>
</body>

</html>
