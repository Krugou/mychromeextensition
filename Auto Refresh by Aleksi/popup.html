<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Auto Refresher Settings</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 15px;
      margin: 0;
      color: #333;
    }

    h2 {
      margin-top: 0;
      font-size: 1.2rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .btn-add {
      padding: 8px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .btn-add:hover {
      background-color: #218838;
    }

    .help-text {
      font-size: 11px;
      color: #6c757d;
      margin-top: -5px;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    .rule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background-color: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .rule-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .rule-info strong {
      font-size: 13px;
      word-break: break-all;
    }

    .rule-info span {
      font-size: 12px;
      color: #666;
    }

    .btn-delete {
      padding: 5px 8px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 10px;
    }

    .btn-delete:hover {
      background-color: #c82333;
    }

    .edit-mode-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid #eee;
    }

    .edit-mode-btn {
      padding: 5px 10px;
      background-color: #6c757d;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .edit-mode-btn:hover {
      background-color: #5a6268;
    }

    .bulk-delete-btn {
      padding: 5px 10px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      display: none;
    }

    .bulk-delete-btn:hover {
      background-color: #c82333;
    }

    .rule-checkbox {
      margin-right: 10px;
      display: none;
    }

    .edit-mode-active .rule-checkbox {
      display: inline-block;
    }

    .edit-mode-active .btn-delete,
    .edit-mode-active .btn-edit {
      display: none;
    }

    .btn-edit {
      padding: 5px 8px;
      background-color: #ffc107;
      color: #333;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 5px;
    }

    .btn-edit:hover {
      background-color: #e0a800;
    }

    .rule-actions {
      display: flex;
    }

    .edit-input {
      width: 100%;
      margin-bottom: 5px;
      padding: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }

    .save-edit-btn {
      padding: 4px 8px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    .cancel-edit-btn {
      padding: 4px 8px;
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 5px;
    }

    .empty-message {
      font-size: 13px;
      color: #6c757d;
      text-align: center;
      padding: 10px;
      display: none;
    }
  </style>
</head>

<body>
  <h2>Auto Refresher</h2>

  <div class="form-group">
    <input type="text" id="urlPattern" placeholder="URL Pattern (e.g. *://www.google.com/*)">
    <div class="help-text">Use * as a wildcard</div>
    <div style="display: flex; gap: 10px;">
      <input type="number" id="timerSeconds" placeholder="Seconds" min="1" style="flex: 1;">
      <select id="timerPreset" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="">Preset</option>
        <option value="15">15 Secs</option>
        <option value="30">30 Secs</option>
        <option value="60">1 Min</option>
        <option value="120">2 Mins</option>
        <option value="300">5 Mins</option>
        <option value="600">10 Mins</option>
        <option value="900">15 Mins</option>
        <option value="1800">30 Mins</option>
        <option value="3600">1 Hour</option>
      </select>
    </div>
    <button class="btn-add" id="addRuleBtn">Add Rule</button>
  </div>

  <div class="edit-mode-controls">
    <button id="toggleEditModeBtn" class="edit-mode-btn">Edit Rules</button>
    <div style="display: flex; align-items: center; gap: 10px;">
      <label id="selectAllContainer" style="display: none; font-size: 13px; cursor: pointer;">
        <input type="checkbox" id="selectAllCheckbox"> All
      </label>
      <button id="bulkDeleteBtn" class="bulk-delete-btn">Delete Selected</button>
    </div>
  </div>

  <ul id="rulesList"></ul>
  <div id="emptyMessage" class="empty-message">No rules added yet.</div>

  <script src="popup.js"></script>
</body>

</html>
